appId: com.agentdock.app
productName: AgentDock
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
asarUnpack:
  - '**/*.node'
  - 'node_modules/node-pty/build/Release/**'
  - 'node_modules/node-pty/prebuilds/**'
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
  # Avoids electron-builder fetching winCodeSign (needed only for exe
  # resource/signature editing) — on this machine extracting that archive
  # fails because non-elevated Windows accounts lack the privilege to
  # create the symlinks it contains. We don't code-sign, so this is safe.
  # Unsigned builds show a Windows SmartScreen warning on first run —
  # expected and documented, not a bug; code signing is out of scope for
  # this pass.
  signAndEditExecutable: false
nsis:
  # Per-user install (no admin elevation required) with a real wizard
  # (not a silent one-click install) so the user can see/choose the
  # install directory and shortcuts, and gets proper Start Menu +
  # uninstaller entries — electron-builder's NSIS target provides both
  # automatically for a non-oneClick build.
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AgentDock
mac:
  target:
    - target: dmg
      arch:
        - x64
    - target: zip
      arch:
        - x64
  icon: build/icon.icns
  category: public.app-category.developer-tools
  # Unsigned build (no Apple Developer certificate/notarization in this
  # pass, per project scope) — Gatekeeper will show an "unidentified
  # developer" warning on first launch. Users must right-click > Open (or
  # System Settings > Privacy & Security > "Open Anyway") once to run it.
  # hardenedRuntime/notarize intentionally left unset until code signing
  # is in scope.
  identity: null
linux:
  target: AppImage
  category: Development
npmRebuild: false
